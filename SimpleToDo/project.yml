name: SimpleToDo

options:
  deploymentTarget:
    iOS: '15.0'

targets:
  SimpleToDo:
    type: application
    platform: iOS

    sources:
      - path: SimpleToDo
        exclude:
          - "Preview Content/**"

    resources:
      - SimpleToDo/Assets.xcassets

    settings:
      base:
        INFOPLIST_FILE: SimpleToDo/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.hackingwithswift.SimpleToDo

        # 👇 重要：未署名前提
        CODE_SIGNING_ALLOWED: NO
        CODE_SIGNING_REQUIRED: NO
        CODE_SIGN_IDENTITY: ""

        SWIFT_VERSION: 5.0
