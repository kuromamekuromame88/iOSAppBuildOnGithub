name: iOS Archive

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  archive:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show directory structure (debug)
        run: ls -R

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Clean
        run: |
          xcodebuild clean \
            -project SimpleToDo/SimpleToDo.xcodeproj \
            -scheme SimpleToDo \
            -configuration Release

      - name: Archive
        run: |
          mkdir -p build
          xcodebuild archive \
            -project SimpleToDo/SimpleToDo.xcodeproj \
            -scheme SimpleToDo \
            -configuration Release \
            -archivePath build/SimpleToDo.xcarchive \
            CODE_SIGNING_ALLOWED=NO

      - name: Upload Archive
        uses: actions/upload-artifact@v4
        with:
          name: SimpleToDo-xcarchive
          path: build/SimpleToDo.xcarchive
