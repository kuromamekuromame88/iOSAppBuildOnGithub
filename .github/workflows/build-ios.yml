name: Build iOS IPA

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build-ios:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Build archive
        run: |
          xcodebuild archive \
            -project SimpleNotes/SimpleNotes.xcodeproj \
            -scheme SimpleNotes \
            -configuration Release \
            -sdk iphoneos \
            -archivePath build/SimpleNotes.xcarchive \
            CODE_SIGNING_ALLOWED=NO

      - name: Export IPA
        run: |
          mkdir -p build/ipa
          xcodebuild -exportArchive \
            -archivePath build/SimpleNotes.xcarchive \
            -exportOptionsPlist ExportOptions.plist \
            -exportPath build/ipa

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: SimpleNotes-ipa
          path: build/ipa/*.ipa
