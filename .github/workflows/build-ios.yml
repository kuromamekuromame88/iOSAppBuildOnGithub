name: Build iOS Archive and Unsigned IPA

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build-ios:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Clean
        run: |
          xcodebuild clean \
            -project SimpleToDo/SimpleToDo.xcodeproj \
            -scheme SimpleToDo \
            -configuration Release

      - name: Build archive (no signing)
        run: |
          xcodebuild archive \
            -project SimpleToDo/SimpleToDo.xcodeproj \
            -scheme SimpleToDo \
            -configuration Release \
            -sdk iphoneos \
            -archivePath build/SimpleToDo.xcarchive \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY=""

      - name: Create unsigned IPA
        run: |
          mkdir -p build/ipa/Payload
          cp -R \
            build/SimpleToDo.xcarchive/Products/Applications/SimpleToDo.app \
            build/ipa/Payload/

          cd build/ipa
          zip -r SimpleToDo-unsigned.ipa Payload

      - name: Upload unsigned IPA
        uses: actions/upload-artifact@v4
        with:
          name: SimpleToDo-unsigned-ipa
          path: build/ipa/SimpleToDo-unsigned.ipa
