name: IOS向けの未署名IPAファイルの生成（XcodeGen使用・生成したIPAはインストール時にアプリをクラッシュさせます

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build-ios:
    runs-on: macos-latest

    steps:
      # 1️⃣ コードチェックアウト
      - name: Checkout
        uses: actions/checkout@v4

      # 2️⃣ Xcode バージョン確認
      - name: Show Xcode version
        run: xcodebuild -version

      # 3️⃣ XcodeGen をインストール
      - name: Install XcodeGen
        run: |
          brew install xcodegen

      # 4️⃣ XcodeGen でプロジェクト生成
      - name: Generate Xcode Project
        run: |
          xcodegen generate --spec SimpleToDo/project.yml --quiet

      # 5️⃣ クリーンビルド
      - name: Clean
        run: |
          xcodebuild clean \
            -project SimpleToDo/SimpleToDo.xcodeproj \
            -scheme SimpleToDo \
            -configuration Release

      # 6️⃣ アーカイブ作成（未署名）
      - name: Build archive (no signing)
        run: |
          xcodebuild archive \
            -project SimpleToDo/SimpleToDo.xcodeproj \
            -scheme SimpleToDo \
            -configuration Release \
            -sdk iphoneos \
            -archivePath build/SimpleToDo.xcarchive \
            INFOPLIST_FILE=SimpleToDo/Info.plist \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY=""

      # 7️⃣ 未署名IPA生成
      - name: Create unsigned IPA
        run: |
          mkdir -p build/ipa/Payload
          cp -R \
            build/SimpleToDo.xcarchive/Products/Applications/SimpleToDo.app \
            build/ipa/Payload/

          cd build/ipa
          zip -r SimpleToDo-unsigned.ipa Payload

      # 8️⃣ アーティファクトとしてアップロード
      - name: Upload unsigned IPA
        uses: actions/upload-artifact@v4
        with:
          name: SimpleToDo-unsigned-ipa
          path: build/ipa/SimpleToDo-unsigned.ipa
